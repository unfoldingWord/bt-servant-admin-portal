name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Font Awesome Pro
        run: |
          echo "@fortawesome:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "//npm.fontawesome.com/:_authToken=${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Patch wrangler config for staging environment
        run: |
          node -e "
            const fs = require('fs');
            const p = 'dist/bt_servant_admin_portal/wrangler.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.name = 'bt-servant-admin-portal-staging';
            c.kv_namespaces = [{ binding: 'AUTH_KV', id: '76b77b269f7c48b481f3448955950b57' }];
            c.services = [{ binding: 'BARUCH', service: 'baruch-staging' }];
            c.vars = { ENGINE_BASE_URL: 'https://staging-api.btservant.ai', BARUCH_BASE_URL: 'https://staging-baruch.btservant.ai' };
            fs.writeFileSync(p, JSON.stringify(c));
            console.log('Patched:', JSON.stringify({ name: c.name, services: c.services, kv: c.kv_namespaces, vars: c.vars }));
          "

      - name: Deploy to Cloudflare Workers (staging)
        run: npx wrangler deploy --config dist/bt_servant_admin_portal/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

